workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - android_sdk # Mặc định Codemagic đã có sẵn
    scripts:
      - name: Build APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk

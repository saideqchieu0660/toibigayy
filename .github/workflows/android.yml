name: Build Android
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Send APK File directly to Telegram Group
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          document: app/build/outputs/apk/debug/app-debug.apk
          message: |
            🎉 Ứng dụng "toibigayy" đã build thành công bản mới rồi nè mày ơi!
            
            📝 Nội dung cập nhật: ${{ github.event.head_commit.message }}
            ⏱ Thời gian: ${{ github.event.head_commit.timestamp }}
